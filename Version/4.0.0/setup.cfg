[flake8]
# W503: line break before binary operator — ignored because W503 and W504 are
# mutually exclusive style preferences; W503 is the PEP 8 recommended style
# and is ignored by default in newer flake8 versions.
# B608: suppressed globally because the flagged string in preview.py is an
# HTML/JavaScript template, not a SQL query.
ignore = W503
max-line-length = 120
