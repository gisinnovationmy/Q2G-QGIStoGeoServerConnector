<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" width="256" height="256">
  <!-- Background -->
  <rect width="256" height="256" fill="#ffffff"/>
  
  <!-- Define Clip Path for Rounded Corners -->
  <defs>
    <clipPath id="tileClip">
      <rect x="48" y="48" width="160" height="160" rx="24"/>
    </clipPath>
  </defs>
  
  <!-- Pastel Flat Tile Base (Clipped Content Group) -->
  <g clip-path="url(#tileClip)">
      <!-- Tile Background Fill -->
      <rect x="48" y="48" width="160" height="160" fill="#DBEAFE"/>
      
      <!-- Green Park Patches -->
      <path d="M 48 48 Q 100 48 120 80 L 48 100 Z" fill="#86EFAC" opacity="0.8" stroke="none"/>
      <path d="M 208 208 Q 156 208 136 176 L 208 156 Z" fill="#86EFAC" opacity="0.8" stroke="none"/>
      
      <!-- Refined Water Feature (Lake) - Bottom Left -->
      <path d="M 50 140 Q 80 130 100 150 Q 90 180 60 180 Q 45 160 50 140 Z" fill="#60A5FA" opacity="0.7" stroke="#3B82F6" stroke-width="1"/>
      
      <!-- Curved Roads (Black Tar) -->
      <path d="M 48 180 Q 100 180 115 135" fill="none" stroke="#334155" stroke-width="24" stroke-linecap="butt"/>
      <path d="M 48 180 Q 100 180 115 135" fill="none" stroke="#FACC15" stroke-width="2" stroke-dasharray="6,6"/>
      <path d="M 208 76 Q 156 76 141 121" fill="none" stroke="#334155" stroke-width="24" stroke-linecap="butt"/>
      <path d="M 208 76 Q 156 76 141 121" fill="none" stroke="#FACC15" stroke-width="2" stroke-dasharray="6,6"/>
  </g>
  
  <!-- Tile Outline (Black Border) -->
  <rect x="48" y="48" width="160" height="160" rx="24" fill="none" stroke="#000000" stroke-width="2"/>
  
  <!-- Roundabout Circle (Tar) -->
  <circle cx="128" cy="128" r="32" fill="#334155" stroke="#1E293B" stroke-width="1"/>
  <circle cx="128" cy="128" r="22" fill="none" stroke="#FACC15" stroke-width="2" stroke-dasharray="8,8"/>
  <circle cx="128" cy="128" r="14" fill="#DBEAFE" stroke="#1E293B" stroke-width="1"/>
  
  <!-- Location Pin (Top-Left Quadrant) -->
  <g transform="translate(80, 80)">
      <ellipse cx="0" cy="28" rx="6" ry="3" fill="#000000" opacity="0.3"/>
      <path d="M 0 -14 Q 14 -14 14 0 Q 14 14 0 28 Q -14 14 -14 0 Q -14 -14 0 -14 Z" fill="#F43F5E" stroke="#ffffff" stroke-width="2"/>
      <circle cx="0" cy="0" r="4" fill="#ffffff"/>
  </g>
  
  <!-- Q2G Text (Variant 15: Thin Outline) -->
  <!-- Stroke Width Reduced from 3 to 1.5 -->
  <g transform="translate(178, 195)">
      <text x="-25" y="0" font-family="Arial" font-size="40" font-weight="900" text-anchor="middle" fill="#589632" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round">Q</text>
      <text x="-25" y="0" font-family="Arial" font-size="40" font-weight="900" text-anchor="middle" fill="#589632">Q</text>
      
      <text x="0" y="0" font-family="Arial" font-size="40" font-weight="900" text-anchor="middle" fill="#334155" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round">2</text>
      <text x="0" y="0" font-family="Arial" font-size="40" font-weight="900" text-anchor="middle" fill="#334155">2</text>
      
      <text x="25" y="0" font-family="Arial" font-size="40" font-weight="900" text-anchor="middle" fill="#0085C3" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round">G</text>
      <text x="25" y="0" font-family="Arial" font-size="40" font-weight="900" text-anchor="middle" fill="#0085C3">G</text>
  </g>
  
</svg>
